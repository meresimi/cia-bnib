name: Build CIA APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform + build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install npm dependencies
        run: npm install

      - name: Build Vite web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Capacitor sync
        run: npx cap sync android

      - name: Patch AGP, splash and launcher icons
        run: |
          sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.5.2/" \\
            android/build.gradle

          cat > android/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
          <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
          <item name="colorPrimary">#FFFFFF</item>
          <item name="colorPrimaryDark">#F0F0F0</item>
          <item name="colorAccent">#3C6AA3</item>
          </style>
          <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.NoActionBar">
          <item name="windowActionBar">false</item>
          <item name="windowNoTitle">true</item>
          <item name="android:background">@null</item>
          </style>
          <style name="AppTheme.NoActionBarLaunch" parent="Theme.AppCompat.NoActionBar">
          <item name="windowActionBar">false</item>
          <item name="windowNoTitle">true</item>
          <item name="android:windowBackground">@drawable/splash_bg</item>
          <item name="android:windowFullscreen">true</item>
          </style>
          </resources>
          XML

          cat > android/app/src/main/res/drawable/splash_bg.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
          <item android:drawable="@android:color/white" />
          <item>
          <bitmap
          android:src="@drawable/splash"
          android:gravity="center"
          android:tileMode="disabled" />
          </item>
          </layer-list>
          XML

          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
          <background android:drawable="@color/ic_launcher_background" />
          <foreground>
          <inset android:drawable="@mipmap/ic_launcher_foreground" android:inset="-5%" />
          </foreground>
          </adaptive-icon>
          XML
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
          <background android:drawable="@color/ic_launcher_background" />
          <foreground>
          <inset android:drawable="@mipmap/ic_launcher_foreground" android:inset="-5%" />
          </foreground>
          </adaptive-icon>
          XML

          cat > android/app/src/main/res/values/ic_launcher_background.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
          <color name="ic_launcher_background">#FFFFFF</color>
          </resources>
          XML

          echo "--- styles.xml ---"
          cat android/app/src/main/res/values/styles.xml
          echo "--- AGP ---"
          grep "com.android.tools.build" android/build.gradle

      - name: Regenerate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Show build result (debug)
        if: always()
        run: |
          echo "=== Gradle build outputs ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "No outputs directory found"
          echo "=== Last 30 lines of build log ==="
          tail -30 android/build.log 2>/dev/null || echo "No build log found"

      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found."
            exit 1
          fi
          mv "$APK" "android/app/build/outputs/apk/debug/CIA-DataApp-${DATE}-debug.apk"
          echo "APK_NAME=CIA-DataApp-${DATE}-debug" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "CIA Data App v1.0.${{ github.run_number }}"
          body: |
            ## CIA Data App
            ### Install
            1. Download the .apk file below
            2. Enable Install from unknown sources in Android Settings
            3. Open the downloaded APK to install
            Built from commit `${{ github.sha }}`
          files: android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
