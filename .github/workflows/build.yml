name: Build CIA APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform + build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── 5. Install JS deps ────────────────────────────────────────────────────
      # `npm install` (not `npm ci`) — repo has no package-lock.json
      - name: Install npm dependencies
        run: npm install

      # ── 6. Build web app ──────────────────────────────────────────────────────
      - name: Build Vite web app
        run: npm run build

      # ── 7. Install Capacitor CLI ──────────────────────────────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      # ── 8. Capacitor sync ─────────────────────────────────────────────────────
      # This is the critical step that:
      #   • copies dist/ into android/app/src/main/assets/public/
      #   • writes android/capacitor-cordova-android-plugins/
      #   • makes node_modules/@capacitor/android/capacitor available as a
      #     local Gradle subproject (referenced in settings.gradle)
      - name: Capacitor sync
        run: npx cap sync android

      # ── 9. Make gradlew executable ────────────────────────────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 10. Build debug APK ────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 11. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/CIA-DataApp-${DATE}-debug.apk
          echo "APK_NAME=CIA-DataApp-${DATE}-debug" >> $GITHUB_ENV

      # ── 12. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 13. GitHub Release ────────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "CIA Data App v1.0.${{ github.run_number }}"
          body: |
            ## CIA Data App — Bahá'í Centres of Intense Activity

            ### What's in this release
            - Data Collection Form for CIAs
            - Core Activities tracking (Children's Classes, Junior Youth, Study Circles, Devotional Meetings)
            - Human Resource Development tracking
            - Summary view with Excel export

            ### Install
            1. Download the `.apk` file below
            2. Enable **Install from unknown sources** in Android Settings → Security
            3. Open the downloaded APK to install

            Built from commit `${{ github.sha }}`
          files: android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
