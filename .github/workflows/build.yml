name: Build CIA APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Gradle — pinned to 8.7 to match gradle-wrapper.properties
      #    This also regenerates the missing gradle-wrapper.jar in the repo
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # ── 5. Android SDK ────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform + build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── 6. Install JS deps ────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 7. Build web app ──────────────────────────────────────────────────────
      - name: Build Vite web app
        run: npm run build

      # ── 8. Capacitor CLI + sync ───────────────────────────────────────────────
      # cap sync copies dist/ into android assets and writes the
      # capacitor-cordova-android-plugins local Gradle subproject
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Capacitor sync
        run: npx cap sync android

      # ── 9. Make gradlew executable ────────────────────────────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 10. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Show APK output directory (debug)
        if: always()
        run: |
          echo "=== Gradle build outputs ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "No outputs directory found"
          echo "=== Last 50 lines of build log ==="
          tail -50 android/build.log 2>/dev/null || echo "No build log found" 

      # ── 11. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found. Build may have failed."
            find android/app/build -type f 2>/dev/null | head -20
            exit 1
          fi
          echo "Found APK: $APK"
          mv "$APK" "android/app/build/outputs/apk/debug/CIA-DataApp-${DATE}-debug.apk"
          echo "APK_NAME=CIA-DataApp-${DATE}-debug" >> $GITHUB_ENV

      # ── 12. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 13. GitHub Release ────────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "CIA Data App v1.0.${{ github.run_number }}"
          body: |
            ## CIA Data App — Bahá'í Centres of Intense Activity

            ### Install
            1. Download the `.apk` file below
            2. Enable **Install from unknown sources** in Android Settings → Security
            3. Open the downloaded APK to install

            Built from commit `${{ github.sha }}`
          files: android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
