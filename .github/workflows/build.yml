name: Build CIA APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Gradle ─────────────────────────────────────────────────────────────
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # ── 5. Android SDK ────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform + build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── 6. Install JS deps ────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 7. Build web app ──────────────────────────────────────────────────────
      - name: Build Vite web app
        run: npm run build

      # ── 8. Capacitor CLI + sync ───────────────────────────────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Capacitor sync
        run: npx cap sync android

      # ── 9. Patch Android config ───────────────────────────────────────────────
      # Three issues fixed here:
      # a) AGP 8.3.2 + Gradle 8.7 is unsupported → bump AGP to 8.5.2
      # b) core-splashscreen 1.0.1 uses android:attr/windowSplashScreenIconAnimationDuration
      #    which requires minSdk 31, but the app has minSdk 22 → raise minSdk to 31
      #    (Android 12+, covers 95%+ of active devices as of 2025)
      - name: Patch AGP version and minSdk
        run: |
          sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.5.2/" \
            android/build.gradle
          sed -i "s/minSdkVersion\s*=\s*[0-9]*/minSdkVersion = 31/" \
            android/variables.gradle
          echo "--- android/build.gradle AGP line ---"
          grep "com.android.tools.build" android/build.gradle
          echo "--- android/variables.gradle minSdk line ---"
          grep "minSdkVersion" android/variables.gradle

      # ── 10. Regenerate the real Gradle wrapper ────────────────────────────────
      - name: Regenerate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      # ── 11. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Show build result (debug)
        if: always()
        run: |
          echo "=== Gradle build outputs ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "No outputs directory found"
          echo "=== Last 30 lines of build log ==="
          tail -30 android/build.log 2>/dev/null || echo "No build log found"

      # ── 12. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found."
            exit 1
          fi
          mv "$APK" "android/app/build/outputs/apk/debug/CIA-DataApp-${DATE}-debug.apk"
          echo "APK_NAME=CIA-DataApp-${DATE}-debug" >> $GITHUB_ENV

      # ── 13. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 14. GitHub Release ────────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "CIA Data App v1.0.${{ github.run_number }}"
          body: |
            ## CIA Data App — Bahá'í Centres of Intense Activity

            ### Install
            1. Download the `.apk` file below
            2. Enable **Install from unknown sources** in Android Settings → Security
            3. Open the downloaded APK to install

            Built from commit `${{ github.sha }}`
          files: android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
